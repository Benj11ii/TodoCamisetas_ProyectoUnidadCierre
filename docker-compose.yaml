version: '3.8'

services:
  # Servicio de PHP
  app:
    image: php:8.4-fpm-alpine
    container_name: todocamisetas_app
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    command: >
      sh -c "docker-php-ext-install pdo pdo_mysql && php-fpm"
    networks:
      - backend_net

  # Servicio de Nginx
  web:
    image: nginx:1.27-alpine
    container_name: todocamisetas_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - backend_net

  # Servicio de Base de Datos
  db:
    image: mysql:8.0
    container_name: todocamisetas_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: todocamisetas
      MYSQL_ROOT_PASSWORD: secret_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend_net

networks:
  backend_net:
    driver: bridge

volumes:
  mysql_data: